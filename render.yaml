# Render Blueprint — ChronoSynapse
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: chronosynapse
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/test
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_TYPE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: chronosynapse-db
          property: connectionString

databases:
  - name: chronosynapse-db
    plan: free
    databaseName: chronosynapse
    user: chronosynapse
