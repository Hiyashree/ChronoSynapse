<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Schools - Timetable Titan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">
            <div class="logo-icon">📅</div>
            <span>Timetable Titan</span>
        </a>
        <div class="user-avatar" onclick="logout()" title="Logout"></div>
    </header>

    <main>
        <h1 class="page-title">Your Schools</h1>
        <p class="page-subtitle">Manage your schools and generate timetables.</p>

        <div class="card" style="margin-bottom: 2rem;">
            <h2 class="card-title">Create a New School</h2>
            <p style="color: var(--text-gray); margin-bottom: 1.5rem;">
                Give your new school a name to get started. Sample data will be added automatically.
            </p>
            <form id="createSchoolForm" style="display: flex; gap: 1rem;">
                <input 
                    type="text" 
                    id="schoolName" 
                    class="form-input" 
                    placeholder="E.g., Northwood High or My First School"
                    style="flex: 1;"
                    required
                >
                <button type="submit" class="btn btn-primary">
                    ➕ Create School
                </button>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title">Your Schools</h2>
            <div id="schoolsContainer" class="schools-grid">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/schools.js"></script>
    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                clearAuth();
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
