<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Timetable Titan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icon">📅</div>
            <span>Timetable Titan</span>
        </a>
        <div>
            <a href="login.html" class="btn btn-secondary">Sign In</a>
        </div>
    </header>

    <main>
        <div style="max-width: 400px; margin: 4rem auto;">
            <h1 class="page-title">Sign Up</h1>
            <p class="page-subtitle">Create your account to get started.</p>

            <div class="card">
                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" name="username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" name="email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" name="password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        Create Account
                    </button>
                </form>
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-gray);">
                    Already have an account? <a href="login.html" style="color: var(--primary-purple);">Sign in</a>
                </p>
                <p style="text-align: center; margin-top: 1rem;">
                    <a href="dashboard.html" style="color: var(--text-gray);">Continue as Guest →</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                await signup(data);
                showAlert('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
    </script>
</body>
</html>
