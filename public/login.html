<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Timetable Titan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">
            <div class="logo-icon">📅</div>
            <span>Timetable Titan</span>
        </a>
        <div>
            <a href="/signup" class="btn btn-secondary">Sign Up</a>
        </div>
    </header>

    <main>
        <div style="max-width: 400px; margin: 4rem auto;">
            <h1 class="page-title">Sign In</h1>
            <p class="page-subtitle">Welcome back! Sign in to continue.</p>

            <div class="card">
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" name="email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        Sign In
                    </button>
                </form>
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-gray);">
                    Don't have an account? <a href="/signup" style="color: var(--primary-purple);">Sign up</a>
                </p>
                <p style="text-align: center; margin-top: 1rem;">
                    <a href="/dashboard" style="color: var(--text-gray);">Continue as Guest →</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                await signin(data);
                window.location.href = '/dashboard';
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
    </script>
</body>
</html>
